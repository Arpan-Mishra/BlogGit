# Railway deployment configuration
# This file configures the API service (Dockerfile).
# The frontend service is a second Railway service pointing to the same repo
# with Dockerfile Path = Dockerfile.frontend set in the Railway dashboard.
#
# Required env vars (set in Railway dashboard → Variables for each service):
#   API service: all vars from .env.example
#   Frontend service: API_BASE_URL=https://<api-service>.railway.app

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn app.api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
