# Railway deployment configuration
# Both the API and frontend services point to this repo.
# Dockerfile path and health check are configured per-service in the Railway dashboard:
#   API service:      Dockerfile path = Dockerfile
#                     Health check path = /health
#   Frontend service: Dockerfile path = Dockerfile.frontend
#                     (no health check — Streamlit does not expose /health)
#
# Required env vars (set in Railway dashboard → Variables for each service):
#   API service: all vars from .env.example
#   Frontend service: API_BASE_URL=https://<api-service>.railway.app

[build]
builder = "DOCKERFILE"
