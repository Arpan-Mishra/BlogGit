services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount source for hot-reload during local dev (remove in prod)
      - ./app:/app/app
      - ./prompts:/app/prompts
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    volumes:
      - ./frontend:/app/frontend
